name: Notify playground of new build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch to playground
        env:
          # PAT with `repo` scope on kintsugi-lang/playground. Stored as a
          # repository secret; the workflow can't run without it.
          GH_TOKEN: ${{ secrets.PLAYGROUND_DISPATCH_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/kintsugi-lang/playground/dispatches \
            -d "{\"event_type\":\"kintsugi-bump\",\"client_payload\":{\"sha\":\"$COMMIT_SHA\"}}"
